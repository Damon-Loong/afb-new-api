# =============================================================================
# new-api（afb-api.mbmzone.com）— /api + /v1，带 Mopc CORS
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name afb-api.mbmzone.com;

    # 建议生产只开 HTTPS，这里示例 80；可改为 return 301 https://$host$request_uri;

    location /api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $mopc_cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,New-API-User" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_pass http://new_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;

        # CORS 相关（仅当 Origin 在白名单 map 中时有值）
        add_header Access-Control-Allow-Origin $mopc_cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
    }

    location /v1/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $mopc_cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,New-API-User" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_pass http://new_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;

        add_header Access-Control-Allow-Origin $mopc_cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
    }

    # 内置管理后台静态资源等同源页面（若你只用 API 子域，可保留根路径反代）
    location / {
        proxy_pass http://new_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

