# -----------------------------------------------------------------------------
# Nginx 示例：配合 Docker Compose（new-api:3000，mopc-web:3001）
#
# 域名（按你实际情况改）：
#   - Mopc 站点：opc.mbmzone.com  → 127.0.0.1:3001
#   - API 网关 ：afb-api.mbmzone.com → 127.0.0.1:3000
#
# 用法：
#   1. 把本文件 include 进 http {}，或复制 server/map 段到现有 nginx。
#   2. 填写 ssl_certificate / ssl_certificate_key（或改用 certbot）。
#   3. nginx -t && systemctl reload nginx
#
# CORS：仅允许 https://opc.mbmzone.com 访问 API（与 Mopc 外网直连 API 一致）。
# 若 new-api 已在应用层返回 CORS，请删掉下面「CORS 相关」的 add_header / OPTIONS 段，
# 避免响应出现重复的 Access-Control-* 头。
# -----------------------------------------------------------------------------

# ---- 放在 http { } 里（与 server 同级）----
map $http_origin $mopc_cors_origin {
    default "";
    "~^https://opc\.mbmzone\.com$" $http_origin;
}

upstream new_api_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream mopc_upstream {
    server 127.0.0.1:3001;
    keepalive 8;
}

# =============================================================================
# Mopc 静态站（opc.mbmzone.com）
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name opc.mbmzone.com;

    # 若使用 certbot，可保留 80 只做跳转：
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://mopc_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

